<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucy AI · Conversation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Modern Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-gradient: radial-gradient(circle at 50% 50%, #110729 0%, #04010a 100%);
  --panel: rgba(20, 10, 40, 0.55);
  --accent: #a855f7;
  --accent-glow: rgba(168, 85, 247, 0.4);
  --ai-bubble: rgba(30, 15, 60, 0.6);
  --user-bubble: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
  --border: rgba(255, 255, 255, 0.08);
  --text-primary: #f3e8ff;
  --text-muted: #c084fc;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  height: 100dvh;
  background: var(--bg-gradient);
  display: flex;
  flex-direction: column;
  color: var(--text-primary);
  overflow: hidden;
  position: relative;
}

/* Background Glowing Blobs */
.background-blobs {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.35;
  animation: float 25s infinite alternate ease-in-out;
}

.blob-1 {
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
  top: 5%;
  right: 15%;
}

.blob-2 {
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, #ec4899 0%, transparent 70%);
  bottom: 10%;
  left: 10%;
  animation-delay: -5s;
}

@keyframes float {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(40px, 30px) scale(1.1); }
  100% { transform: translate(-20px, -40px) scale(0.9); }
}

/* Header */
header {
  height: 64px;
  padding: 0 24px;
  background: var(--panel);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 20px;
  background: linear-gradient(135deg, #ffffff 0%, #d8b4fe 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #a855f7;
  box-shadow: 0 0 10px #a855f7;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Round Profile Avatar Button in Header */
.avatar-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #a855f7 0%, #db2777 100%);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 10px rgba(168, 85, 247, 0.35);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  outline: none;
}

.avatar-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 15px rgba(168, 85, 247, 0.5);
}

/* Chat Board Area */
#board {
  flex: 1;
  padding: 20px;
  display: flex;
  justify-content: center;
  overflow: hidden;
  z-index: 5;
}

#chat {
  width: 100%;
  max-width: 850px;
  background: rgba(18, 9, 36, 0.45);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 24px;
  overflow-y: auto;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
  display: flex;
  flex-direction: column;
  gap: 18px;
  scroll-behavior: smooth;
}

/* Scrollbar Design */
#chat::-webkit-scrollbar {
  width: 6px;
}
#chat::-webkit-scrollbar-track {
  background: transparent;
}
#chat::-webkit-scrollbar-thumb {
  background: rgba(168, 85, 247, 0.2);
  border-radius: 10px;
}
#chat::-webkit-scrollbar-thumb:hover {
  background: rgba(168, 85, 247, 0.4);
}

/* Message Rows */
.row {
  display: flex;
  gap: 12px;
  max-width: 85%;
  animation: messageEntrance 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
}

.row.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.row.ai {
  align-self: flex-start;
}

@keyframes messageEntrance {
  from { opacity: 0; transform: translateY(15px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Avatar styling */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

.avatar.user {
  background: linear-gradient(135deg, #a855f7 0%, #db2777 100%);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.avatar.ai {
  background: rgba(22, 10, 45, 0.95);
  border: 1px solid rgba(168, 85, 247, 0.4);
  box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
}

/* Chat Message Bubbles */
.msg {
  padding: 14px 18px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.55;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
  white-space: pre-wrap; /* 👈 Support line-breaks naturally */
}

.user .msg {
  background: var(--user-bubble);
  border-bottom-right-radius: 4px;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.ai .msg {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: #e9e3ff;
}

/* Message Formatting Utilities */
.msg strong {
  color: #f0abfc;
  font-weight: 600;
}

/* Code block styles */
.msg pre {
  background: rgba(10, 5, 20, 0.85);
  border: 1px solid rgba(168, 85, 247, 0.25);
  border-radius: 10px;
  padding: 12px;
  margin: 10px 0;
  overflow-x: auto;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
}

.msg code {
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 14px;
  color: #c084fc;
}

.msg pre code {
  color: #e9d5ff;
}

/* Footer / Input box */
footer {
  height: 80px;
  padding: 12px 24px;
  background: var(--panel);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.2);
}

.input-container {
  width: 100%;
  max-width: 850px;
  display: flex;
  gap: 12px;
}

input {
  flex: 1;
  padding: 16px 20px;
  background: rgba(10, 5, 22, 0.7);
  border: 1px solid rgba(168, 85, 247, 0.25);
  border-radius: 16px;
  color: white;
  font-size: 15px;
  outline: none;
  transition: all 0.3s ease;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
  background: rgba(10, 5, 22, 0.9);
}

button.send {
  padding: 16px 24px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
  color: white;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(124, 58, 237, 0.3);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

button.send:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(124, 58, 237, 0.45);
  filter: brightness(1.1);
}

button.send:active {
  transform: translateY(0);
}

/* Typing indicator */
.typing {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 10px;
}

.dot {
  width: 7px;
  height: 7px;
  background: #a855f7;
  border-radius: 50%;
  opacity: 0.3;
  animation: bounce 1.4s infinite both;
  box-shadow: 0 0 5px #a855f7;
}

.dot:nth-child(2) {
  animation-delay: 0.2s;
}

.dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes bounce {
  0%, 80%, 100% {
    transform: scale(0.6);
    opacity: 0.3;
  }
  40% {
    transform: scale(1.1) translateY(-6px);
    opacity: 1;
  }
}

/* Toast Banners */
.toast-container {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  width: 90%;
  max-width: 360px;
}

.toast {
  background: rgba(18, 9, 36, 0.95);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid;
  border-radius: 12px;
  padding: 14px 18px;
  color: white;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transform: translateY(-20px);
  opacity: 0;
  animation: slideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  transition: all 0.3s ease;
}

.toast.success {
  border-color: rgba(34, 197, 94, 0.3);
  border-left: 4px solid #22c55e;
}

.toast.error {
  border-color: rgba(239, 68, 68, 0.3);
  border-left: 4px solid #ef4444;
}

@keyframes slideIn {
  to { transform: translateY(0); opacity: 1; }
}

/* =========================================
   Sliding Profile Settings Drawer (CSS)
   ========================================= */
.drawer {
  position: fixed;
  top: 0;
  right: -380px; /* Hidden off-screen */
  width: 380px;
  height: 100dvh;
  background: rgba(15, 6, 33, 0.85);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-left: 1px solid var(--border);
  box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
  will-change: right;
}

.drawer.active {
  right: 0;
}

.drawer-header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.drawer-header h3 {
  font-size: 18px;
  font-weight: 600;
  color: #f3e8ff;
}

.close-btn {
  background: transparent;
  border: none;
  color: #c084fc;
  font-size: 20px;
  cursor: pointer;
  transition: color 0.2s ease;
}
.close-btn:hover {
  color: white;
}

.drawer-body {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* Drawer Profile Avatar Layout */
.profile-avatar-large {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, #a855f7 0%, #db2777 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 700;
  color: white;
  margin: 0 auto 16px auto;
  box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
  border: 2px solid rgba(255, 255, 255, 0.1);
}

.profile-meta {
  text-align: center;
  margin-bottom: 20px;
}

.profile-meta-title {
  font-size: 18px;
  font-weight: 600;
  color: white;
}

.profile-meta-subtitle {
  font-size: 14px;
  color: #c084fc;
  margin-top: 4px;
  word-break: break-all;
}

.drawer-divider {
  border: 0;
  height: 1px;
  background: rgba(255, 255, 255, 0.08);
  margin: 20px 0;
}

.form-section h4 {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #c084fc;
  margin-bottom: 12px;
}

.form-section .danger-title {
  color: #f87171;
}

.form-section .form-group {
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
}

.form-section label {
  font-size: 12px;
  font-weight: 500;
  color: #a78bfa;
  margin-bottom: 6px;
}

.form-section input {
  width: 100%;
  padding: 12px 14px;
  background: rgba(10, 5, 22, 0.6);
  border: 1px solid rgba(168, 85, 247, 0.2);
  border-radius: 10px;
  color: white;
  font-size: 14px;
  outline: none;
  transition: all 0.3s ease;
}

.form-section input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

.main-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
  border: none;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  margin-top: 10px;
  box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3);
}
.main-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(124, 58, 237, 0.45);
}

.drawer-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
}

.logout-btn {
  width: 100%;
  padding: 12px;
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.4);
  border-radius: 12px;
  color: #f87171;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.logout-btn:hover {
  background: rgba(239, 68, 68, 0.35);
  color: white;
  box-shadow: 0 0 15px rgba(239, 68, 68, 0.25);
}

/* Background Blur Overlay */
.drawer-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100dvh;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.drawer-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* Adaptive layout logic */
@media (max-width: 768px) {
  #board {
    padding: 10px;
  }
  #chat {
    border-radius: 18px;
    padding: 16px;
  }
  .row {
    max-width: 92%;
  }
  .msg {
    font-size: 14px;
    padding: 12px 15px;
  }
  footer {
    height: 72px;
    padding: 10px 16px;
  }
  button.send {
    padding: 12px 18px;
  }
}

@media (max-width: 480px) {
  .drawer {
    width: 100%;
    right: -100%;
  }
}
</style>
</head>

<body>

<!-- Blurry space elements background -->
<div class="background-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<!-- Toast Box -->
<div class="toast-container" id="toastContainer"></div>

<!-- Darken/Blur Overlay behind Drawer -->
<div id="drawerOverlay" class="drawer-overlay" onclick="toggleProfileDrawer()"></div>

<!-- Header -->
<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <span>Lucy Companion</span>
  </div>
  <div class="header-actions">
    <!-- Round User Avatar Button -->
    <button id="avatarBtn" class="avatar-btn" onclick="toggleProfileDrawer()">?</button>
  </div>
</header>

<!-- Chat Window -->
<div id="board">
  <div id="chat"></div>
</div>

<!-- Input Box -->
<footer>
  <div class="input-container">
    <input id="input" placeholder="Say something to Lucy..." autocomplete="off">
    <button class="send" onclick="send()">Send</button>
  </div>
</footer>

<!-- Profile Side Panel (Drawer) -->
<div id="profileDrawer" class="drawer">
  <div class="drawer-header">
    <h3>Account Profile</h3>
    <button class="close-btn" onclick="toggleProfileDrawer()">✕</button>
  </div>
  
  <div class="drawer-body">
    <div class="profile-avatar-large" id="profileInitials">?</div>
    <div class="profile-meta">
      <div class="profile-meta-title" id="profileNameDisplay">User Name</div>
      <div class="profile-meta-subtitle" id="profileEmailDisplay">user@example.com</div>
    </div>
    
    <hr class="drawer-divider">
    
    <!-- Profile Edit Form -->
    <div class="form-section">
      <h4>Edit Profile</h4>
      
      <div class="form-group">
        <label for="pName">Display Name</label>
        <input id="pName" placeholder="Enter name">
      </div>
      
      <div class="form-group">
        <label for="pEmail">Email Address</label>
        <input id="pEmail" placeholder="Enter email">
      </div>
      
      <hr class="drawer-divider">
      <h4>Change Password</h4>
      
      <div class="form-group">
        <label for="pNewPassword">New Password (optional)</label>
        <input id="pNewPassword" type="password" placeholder="Enter new password">
      </div>
      
      <hr class="drawer-divider">
      <h4 class="danger-title">Verify Credentials to Save</h4>
      
      <div class="form-group">
        <label for="pCurrentPassword">Current Password (required)</label>
        <input id="pCurrentPassword" type="password" placeholder="Verify current password">
      </div>
      
      <button class="main-btn" onclick="updateProfile()">Save Changes</button>
    </div>
  </div>
  
  <div class="drawer-footer">
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</div>

<script>
const API = "https://YOUR.workers.dev";
const PAGES = "https://YOUR.pages.dev";
const chat = document.getElementById("chat");
// Explicitly reference the input DOM element to fix critical Uncaught ReferenceError
const input = document.getElementById("input");

let USER = "?";
let TOKEN = localStorage.getItem("lucy_token");
let currentName = "";
let currentEmail = "";

// Dynamic storage key scoped per user to ensure history isolation/privacy
let userStorageKey = "lucy_chat_history";

function authHeaders(){
  return { "Authorization": `Bearer ${TOKEN}` };
}

function clearSession(){
  localStorage.removeItem("lucy_token");
  localStorage.removeItem("lucy_name");
}

/* ---------- ELEGANT TOAST BANNERS ---------- */
function showToast(message, type = "error") {
  const container = document.getElementById("toastContainer");
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  const icon = type === "success" ? "✨" : "🛑";
  toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = "0";
    setTimeout(() => toast.remove(), 300);
  }, 3200);
}

/* ---------- PROFILE DRAWER CONTROLLER ---------- */
function toggleProfileDrawer() {
  const drawer = document.getElementById("profileDrawer");
  const overlay = document.getElementById("drawerOverlay");
  
  drawer.classList.toggle("active");
  overlay.classList.toggle("active");
  
  // Clear verify passwords whenever toggled
  document.getElementById("pCurrentPassword").value = "";
  document.getElementById("pNewPassword").value = "";
}

/* ---------- UPDATE PROFILE HANDLER ---------- */
async function updateProfile() {
  const name = document.getElementById("pName").value.trim();
  const email = document.getElementById("pEmail").value.trim();
  const newPassword = document.getElementById("pNewPassword").value;
  const currentPassword = document.getElementById("pCurrentPassword").value;

  if (!name || !email) {
    showToast("Name and Email cannot be empty.", "error");
    return;
  }

  if (!currentPassword) {
    showToast("Current password is required to verify changes.", "error");
    return;
  }

  try {
    const r = await fetch(API + "/update-profile", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...authHeaders()
      },
      body: JSON.stringify({
        name,
        email,
        currentPassword,
        newPassword
      })
    });

    if (r.ok) {
      const data = await r.json();
      
      // Update local storage name cache
      localStorage.setItem("lucy_name", data.name);
      
      // Migrate local storage history keys if email changed
      if (currentEmail.toLowerCase() !== data.email.toLowerCase()) {
        const oldKey = `lucy_chat_history:${currentEmail}`;
        const newKey = `lucy_chat_history:${data.email}`;
        const historyData = localStorage.getItem(oldKey);
        if (historyData) {
          localStorage.setItem(newKey, historyData);
          localStorage.removeItem(oldKey);
        }
        currentEmail = data.email;
        userStorageKey = newKey;
      }
      
      currentName = data.name;
      USER = data.name[0].toUpperCase();

      // Refresh UI display elements immediately
      document.getElementById("avatarBtn").textContent = USER;
      document.getElementById("profileInitials").textContent = USER;
      document.getElementById("profileNameDisplay").textContent = currentName;
      document.getElementById("profileEmailDisplay").textContent = currentEmail;
      
      document.title = `Lucy AI · Chatting with ${data.name}`;
      showToast("Profile details updated successfully!", "success");
      
      document.getElementById("pCurrentPassword").value = "";
      document.getElementById("pNewPassword").value = "";
      
      // Smoothly hide panel after save succeeds
      setTimeout(() => {
        toggleProfileDrawer();
      }, 1400);
    } else {
      const errorText = await r.text();
      showToast(errorText || "Profile update failed.", "error");
    }
  } catch (err) {
    showToast("Server connection error. Please try again.", "error");
  }
}

/* ---------- ELEGANT MARKDOWN & CODE PARSING WITH XSS ESCAPING ---------- */
function formatAI(t) {
  // Escape HTML first to prevent any cross-site scripting (XSS) injections
  let escaped = escapeHtml(t);
  
  // 1. Format code blocks (```code```)
  let formatted = escaped.replace(/```([\s\S]*?)```/g, function(match, p1) {
    return `<pre><code>${p1.trim()}</code></pre>`;
  });
  
  // 2. Format inline code (`code`)
  formatted = formatted.replace(/`([^`]+)`/g, "<code>$1</code>");
  
  // 3. Format bold (**bold** or *bold*)
  formatted = formatted.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  formatted = formatted.replace(/\*([^*]+)\*/g, "<strong>$1</strong>");
  
  return formatted;
}

function escapeHtml(string) {
  return String(string)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* ---------- LOAD HISTORY ---------- */
function loadHistory(){
  const data = JSON.parse(localStorage.getItem(userStorageKey) || "[]");
  // Clean container and redraw to prevent dual traces
  chat.innerHTML = "";
  data.forEach(m => addMessage(m.text, m.type, false));
}

/* ---------- SAVE MESSAGE ---------- */
function saveMessage(text, type){
  const data = JSON.parse(localStorage.getItem(userStorageKey) || "[]");
  data.push({text, type});
  // Cap local storage history at a maximum of 100 messages
  if (data.length > 100) {
    data.shift();
  }
  localStorage.setItem(userStorageKey, JSON.stringify(data));
}

/* ---------- ADD MESSAGE ---------- */
function addMessage(text, type, save = true){
  const row = document.createElement("div");
  row.className = "row " + type;

  const avatar = document.createElement("div");
  avatar.className = "avatar " + type;
  avatar.textContent = type === "ai" ? "💜" : USER;

  const msg = document.createElement("div");
  msg.className = "msg";
  msg.innerHTML = type === "ai" ? formatAI(text) : escapeHtml(text);

  type === "user" ? row.append(msg, avatar) : row.append(avatar, msg);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;

  if(save) saveMessage(text, type);
}

/* ---------- TYPING INDICATOR ---------- */
function showTyping(){
  const row = document.createElement("div");
  row.className = "row ai";
  row.id = "typing";
  row.innerHTML = `
    <div class="avatar ai">💜</div>
    <div class="msg">
      <div class="typing">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

/* ---------- SEND ---------- */
let isSending = false; // Block duplicates (race condition protection)

async function send(){
  const t = input.value.trim();
  if(!t || isSending) return;
  
  isSending = true;
  input.value = "";
  addMessage(t, "user");
  showTyping();

  try {
    // Send prompts securely via POST requests rather than GET query params
    const r = await fetch(API + "/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...authHeaders()
      },
      body: JSON.stringify({ prompt: t })
    });

    if(r.status === 401){
      document.getElementById("typing")?.remove();
      showToast("Session expired. Redirecting to login...", "error");
      clearSession();
      setTimeout(() => {
        location.href = PAGES;
      }, 1500);
      return;
    }

    const reply = await r.text();
    document.getElementById("typing")?.remove();
    addMessage(reply, "ai");
  } catch (err) {
    document.getElementById("typing")?.remove();
    addMessage("Sorry, I had trouble reaching the server. Please try sending your message again.", "ai");
  } finally {
    isSending = false; // Release lock
  }
}

// Allow Enter key press to send message
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    send();
  }
});

/* ---------- LOGOUT ---------- */
async function logout(){
  // Clear local storage history scoped specifically to this user
  localStorage.removeItem(userStorageKey);
  try {
    await fetch(API + "/logout", {
      headers: authHeaders()
    });
  } catch (err) {
    console.error("Logout request failed:", err);
  }
  clearSession();
  location.href = PAGES;
}

/* ---------- INIT ---------- */
(async()=>{
  if(!TOKEN){
    location.href = PAGES;
    return;
  }

  try {
    const r = await fetch(API + "/me", {
      headers: authHeaders()
    });

    if(!r.ok){
      clearSession();
      location.href = PAGES;
      return;
    }

    const d = await r.json();
    currentName = d.name;
    currentEmail = d.email;
    USER = d.name[0].toUpperCase();
    
    // Set custom page title
    document.title = `Lucy AI · Chatting with ${d.name}`;
    
    // Bind current user metadata to layout
    document.getElementById("avatarBtn").textContent = USER;
    document.getElementById("profileInitials").textContent = USER;
    document.getElementById("profileNameDisplay").textContent = currentName;
    document.getElementById("profileEmailDisplay").textContent = currentEmail;
    
    document.getElementById("pName").value = currentName;
    document.getElementById("pEmail").value = currentEmail;
    
    // Setup isolated storage key
    userStorageKey = `lucy_chat_history:${currentEmail}`;
    
    loadHistory();
  } catch (err) {
    clearSession();
    location.href = PAGES;
  }
})();
</script>
